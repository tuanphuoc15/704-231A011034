<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tab View</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    .tabs { display: flex; gap: 10px; margin-bottom: 12px; }
    .tab-btn {
      padding: 8px 14px;
      border: 1px solid #ccc;
      background: #f5f5f5;
      cursor: pointer;
      border-radius: 6px;
    }
    .tab-btn.active {
      background: #2f6fed;
      color: #fff;
      border-color: #2f6fed;
    }
    .tab-content {
      display: none;
      border: 1px solid #ddd;
      padding: 12px;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <div class="tabs">
    <button class="tab-btn active" onclick="openTab('tab1', this)">Tab 1</button>
    <button class="tab-btn" onclick="openTab('tab2', this)">Tab 2</button>
    <button class="tab-btn" onclick="openTab('tab3', this)">Tab 3</button>
  </div>

  <div id="tab1" class="tab-content" style="display: block;">Nội dung Tab 1</div>
  <div id="tab2" class="tab-content">Nội dung Tab 2</div>
  <div id="tab3" class="tab-content">Nội dung Tab 3</div>

  <script>
    function openTab(tabName, btn) {
      document.querySelectorAll(".tab-content").forEach(c => c.style.display = "none");
      document.getElementById(tabName).style.display = "block";

      document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
    }
  </script>
</body>
</html>
