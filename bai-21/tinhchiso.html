<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tính BMI</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    .box { max-width: 360px; display: grid; gap: 10px; }
    input, button { padding: 8px; font-size: 15px; }
    #result { margin-top: 10px; font-weight: bold; }
  </style>
</head>
<body>
  <div class="box">
    <input id="weight" type="number" step="0.1" placeholder="Cân nặng (kg)" />
    <input id="height" type="number" step="0.01" placeholder="Chiều cao (m)" />
    <button onclick="calculateBMI()">Tính BMI</button>
    <div id="result"></div>
  </div>

  <script>
    function calculateBMI() {
      const weight = parseFloat(document.getElementById("weight").value);
      const height = parseFloat(document.getElementById("height").value);
      const result = document.getElementById("result");

      if (!weight || !height || height <= 0) {
        result.textContent = "Vui lòng nhập dữ liệu hợp lệ.";
        return;
      }

      const bmi = weight / (height * height);
      let category = "";

      if (bmi < 18.5) category = "Thiếu cân";
      else if (bmi < 25) category = "Bình thường";
      else category = "Thừa cân";

      result.textContent = `BMI: ${bmi.toFixed(2)} - ${category}`;
    }
  </script>
</body>
</html>
